<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Codex Session Viewer</title>
<style>
  *, *::before, *::after { box-sizing: border-box; }
  :root { --bg0: #0b0d10; --bg1: #12161b; --bg2: #191f26; --bg3: #222a33; --border: #2d3844; --text0: #e7edf3; --text1: #b4c0cc; --text2: #738292; --accent: #6ea8fe; --user: #62c486; --tool: #d6aa54; }
  body { margin: 0; background: var(--bg0); color: var(--text0); font: 14px/1.45 system-ui, sans-serif; }
  #app { display: grid; grid-template-columns: 280px 390px minmax(0, 1fr); grid-template-rows: 50px minmax(0, 1fr); height: 100vh; }
  header { grid-column: 1 / -1; display: flex; align-items: center; gap: 12px; padding: 0 14px; background: var(--bg1); border-bottom: 1px solid var(--border); }
  .brand { color: var(--accent); font-weight: 700; }
  .panel { min-width: 0; overflow: auto; border-right: 1px solid var(--border); }
  .panel-head { position: sticky; top: 0; background: var(--bg1); border-bottom: 1px solid var(--border); padding: 10px 12px; }
  input, select, button { font: inherit; }
  input, select { width: 100%; color: var(--text0); background: var(--bg2); border: 1px solid var(--border); border-radius: 5px; padding: 6px 8px; }
  .project-item, .thread-item { padding: 10px 12px; border-bottom: 1px solid var(--border); cursor: pointer; }
  .project-item:hover, .thread-item:hover, .active { background: var(--bg3); }
  .item-title { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .item-sub { color: var(--text2); font-size: 11px; margin-top: 3px; }
  .empty { color: var(--text2); padding: 20px 14px; }
  #messages { padding: 14px; display: flex; flex-direction: column; gap: 12px; }
  .msg { border: 1px solid var(--border); border-radius: 6px; overflow: hidden; background: var(--bg1); }
  .msg-head { padding: 6px 10px; border-bottom: 1px solid var(--border); background: var(--bg2); color: var(--text2); font-size: 11px; font-weight: 700; text-transform: uppercase; }
  .msg-user .msg-head { color: var(--user); }
  .msg-tool_call .msg-head, .msg-tool_output .msg-head { color: var(--tool); }
  .msg-body { padding: 10px 12px; }
  pre { margin: 0; white-space: pre-wrap; word-break: break-word; color: var(--text0); font: 12.5px/1.55 Consolas, Menlo, monospace; }
</style>
</head>
<body>
<div id="app">
  <header><div class="brand">Codex Session Viewer</div><div id="status">Loading...</div></header>
  <aside class="panel"><div class="panel-head"><button id="allProjectsBtn">All projects</button></div><div id="projectList"></div></aside>
  <aside class="panel"><div class="panel-head"><input id="searchInput" type="search" placeholder="Search title, cwd, id" /></div><div id="threadList"></div></aside>
  <main class="panel"><div class="panel-head"><div id="threadTitle">Select a thread</div></div><div id="messages"><div class="empty">Choose a project and thread.</div></div></main>
</div>
<script>
const state = { projects: [], threads: [], selectedCwd: "", selectedThreadId: "", query: "", includeInternal: false };
const el = { status: document.getElementById("status"), projectList: document.getElementById("projectList"), threadList: document.getElementById("threadList"), searchInput: document.getElementById("searchInput"), allProjectsBtn: document.getElementById("allProjectsBtn"), threadTitle: document.getElementById("threadTitle"), messages: document.getElementById("messages") };
function escapeHtml(value) { return String(value ?? "").replaceAll("&", "&amp;").replaceAll("<", "&lt;").replaceAll(">", "&gt;").replaceAll('"', "&quot;").replaceAll("'", "&#039;"); }
async function fetchJson(url) { const res = await fetch(url); if (!res.ok) throw new Error(await res.text()); return res.json(); }
function shortPath(path) { const parts = String(path || "").split("/").filter(Boolean); return parts.length > 2 ? parts.slice(-2).join("/") : path; }
async function loadStatus() { const status = await fetchJson("/api/status"); el.status.textContent = `${status.active_threads} active | ${status.archived_threads} archived`; }
async function loadProjects() { state.projects = (await fetchJson("/api/projects")).projects; renderProjects(); }
async function loadThreads() { const params = new URLSearchParams(); if (state.selectedCwd) params.set("cwd", state.selectedCwd); if (state.query) params.set("q", state.query); state.threads = (await fetchJson(`/api/threads?${params}`)).threads; renderThreads(); }
async function loadThread(threadId) { state.selectedThreadId = threadId; const data = await fetchJson(`/api/threads/${encodeURIComponent(threadId)}`); el.threadTitle.textContent = data.thread.title || data.thread.id; el.messages.innerHTML = data.events.map(renderEvent).join("") || `<div class="empty">No displayable transcript events.</div>`; }
function renderProjects() { el.projectList.innerHTML = state.projects.map(project => `<div class="project-item" data-cwd="${escapeHtml(project.cwd)}"><div class="item-title">${escapeHtml(shortPath(project.cwd))}</div><div class="item-sub">${project.total} sessions</div></div>`).join("") || `<div class="empty">No projects found.</div>`; }
function renderThreads() { el.threadList.innerHTML = state.threads.map(thread => `<div class="thread-item" data-id="${thread.id}"><div class="item-title">${escapeHtml(thread.title)}</div><div class="item-sub">${escapeHtml(shortPath(thread.cwd))}</div></div>`).join("") || `<div class="empty">No threads match this filter.</div>`; }
function renderEvent(event) { const cls = event.kind === "message" ? event.role : event.kind; return `<article class="msg msg-${escapeHtml(cls)}"><div class="msg-head">${escapeHtml(event.role || event.kind)} · line ${escapeHtml(event.line)}</div><div class="msg-body"><pre>${escapeHtml(event.text)}</pre></div></article>`; }
el.projectList.addEventListener("click", event => { const item = event.target.closest(".project-item"); if (!item) return; state.selectedCwd = item.dataset.cwd || ""; loadThreads().catch(showError); });
el.threadList.addEventListener("click", event => { const item = event.target.closest(".thread-item"); if (!item) return; loadThread(item.dataset.id).catch(showError); });
el.searchInput.addEventListener("input", () => { state.query = el.searchInput.value.trim(); loadThreads().catch(showError); });
el.allProjectsBtn.addEventListener("click", () => { state.selectedCwd = ""; loadThreads().catch(showError); });
function showError(error) { el.messages.innerHTML = `<div class="empty">${escapeHtml(error.message || error)}</div>`; }
async function init() { await loadStatus(); await loadProjects(); await loadThreads(); }
init().catch(showError);
</script>
</body>
</html>
